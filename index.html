<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1b1d24" />
    <meta
      name="description"
      content="Cole Foos — software engineer building authorization systems on AWS Verified Permissions. Live, in-browser demos of real work, including the Cedar language server."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <title>Cole Foos — Software Engineer</title>
    <!-- Set the theme before first paint (stored choice, else OS preference)
         so there's no light/dark flash. React keeps it in sync after mount. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem("theme");
          if (t !== "light" && t !== "dark") {
            t = matchMedia("(prefers-color-scheme: light)").matches
              ? "light"
              : "dark";
          }
          document.documentElement.dataset.theme = t;
          var m = document.querySelector('meta[name="theme-color"]');
          if (m)
            m.setAttribute("content", t === "dark" ? "#1b1d24" : "#f6f7f8");
        } catch (e) {
          document.documentElement.dataset.theme = "dark";
        }
      })();
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <form name="contact" netlify netlify-honeypot="bot-field" hidden>
      <input type="email" name="email" />
      <input type="text" name="name" />
      <input type="email" name="company" />
      <textarea name="details"></textarea>
    </form>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
